name: Build Puhti Container

on:
  push:
    branches: [main]
    paths:
      - 'apptainer/**.def'
  workflow_dispatch:
    inputs:
      def_file:
        description: 'Which .def file to build (e.g. general-compute)'
        required: false
        default: ''

jobs:
  detect:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect changed def files
        id: set
        run: |
          if [ -n "${{ github.event.inputs.def_file }}" ]; then
            # Manual dispatch with explicit name
            NAMES='["${{ github.event.inputs.def_file }}"]'
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            # Manual dispatch with no input — build all
            NAMES=$(ls apptainer/*.def | xargs -I{} basename {} .def | jq -Rsc 'split("\n")[:-1]')
          else
            # Push/PR — build only changed ones
            NAMES=$(git diff --name-only HEAD~1 HEAD -- 'apptainer/*.def' \
              | xargs -I{} basename {} .def \
              | jq -Rsc 'split("\n")[:-1]')
          fi
          echo "Building: $NAMES"
          echo "matrix={\"name\":$NAMES}" >> $GITHUB_OUTPUT

  build:
    needs: detect
    if: ${{ needs.detect.outputs.matrix != '{"name":[]}' }}
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      matrix: ${{ fromJson(needs.detect.outputs.matrix) }}
      fail-fast: false

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.PUHTI_SSH_KEY }}" > ~/.ssh/id_puhti
          chmod 600 ~/.ssh/id_puhti
          ssh-keyscan -H puhti.csc.fi >> ~/.ssh/known_hosts

      - name: Copy def file to Puhti scratch
        run: |
          scp -i ~/.ssh/id_puhti \
            apptainer/${{ matrix.name }}.def \
            ${{ secrets.PUHTI_USER }}@puhti.csc.fi:/scratch/project_2014823/runs/${{ matrix.name }}.def

      - name: Submit container build job on Puhti
        id: submit
        run: |
          NAME=${{ matrix.name }}
          OUTPUT=$(ssh -i ~/.ssh/id_puhti ${{ secrets.PUHTI_USER }}@puhti.csc.fi \
            "sbatch \
              --account=project_2014823 \
              --partition=small \
              --cpus-per-task=4 \
              --mem=16G \
              --time=01:00:00 \
              --output=/scratch/project_2014823/runs/build-${NAME}-%j.out \
              --wrap=\"
                export MODULEPATH=/appl/modulefiles:\\\$MODULEPATH
                module load apptainer
                export APPTAINER_TMPDIR=/scratch/project_2014823/tmp
                export APPTAINER_CACHEDIR=/scratch/project_2014823/apptainer-cache
                mkdir -p \\\$APPTAINER_TMPDIR \\\$APPTAINER_CACHEDIR
                apptainer build --force \
                  /scratch/project_2014823/runs/${NAME}.sif \
                  /scratch/project_2014823/runs/${NAME}.def \
                && echo BUILD_SUCCESS \
                || echo BUILD_FAILED
              \"")
          echo "Submit output: $OUTPUT"
          JOB_ID=$(echo "$OUTPUT" | awk '{print $NF}')
          echo "job_id=$JOB_ID" >> $GITHUB_OUTPUT
          echo "Slurm job ID: $JOB_ID"

      - name: Poll until build completes
        run: |
          JOB_ID=${{ steps.submit.outputs.job_id }}
          echo "Polling job $JOB_ID..."
          for i in $(seq 1 60); do
            sleep 60
            STATE=$(ssh -i ~/.ssh/id_puhti ${{ secrets.PUHTI_USER }}@puhti.csc.fi \
              "squeue -j $JOB_ID -h --format=%T 2>/dev/null || echo DONE")
            echo "[$i/60] State: $STATE"
            if [ "$STATE" = "DONE" ] || [ -z "$STATE" ]; then
              echo "Job finished, checking result..."
              break
            fi
          done

      - name: Check build result
        run: |
          NAME=${{ matrix.name }}
          JOB_ID=${{ steps.submit.outputs.job_id }}
          ssh -i ~/.ssh/id_puhti ${{ secrets.PUHTI_USER }}@puhti.csc.fi \
            "cat /scratch/project_2014823/runs/build-${NAME}-${JOB_ID}.out 2>/dev/null | tail -30"

          RESULT=$(ssh -i ~/.ssh/id_puhti ${{ secrets.PUHTI_USER }}@puhti.csc.fi \
            "ls -lh /scratch/project_2014823/runs/${NAME}.sif 2>/dev/null | tail -1")
          echo "SIF file: $RESULT"

          STATE=$(ssh -i ~/.ssh/id_puhti ${{ secrets.PUHTI_USER }}@puhti.csc.fi \
            "sacct -j $JOB_ID --format=State --noheader | head -1 | tr -d ' '")
          echo "Final state: $STATE"

          if [ "$STATE" = "COMPLETED" ]; then
            echo "✅ ${{ matrix.name }}.sif built successfully!"
          else
            echo "❌ Build failed with state: $STATE"
            exit 1
          fi

      - name: Notify success
        if: success()
        run: echo "✅ ${{ matrix.name }}.sif rebuilt on Puhti"

      - name: Notify failure
        if: failure()
        run: echo "❌ ${{ matrix.name }}.sif build failed — previous container still in use"
